<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이콩콩 AS 신청 상세</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #edf2f8;
      --card: #ffffff;
      --line: #e2e8f0;
      --text: #182230;
      --muted: #66758a;
      --blue: #2f9191;
      --blue-soft: #e8f5f4;
      --green: #047857;
      --green-soft: #ecfdf5;
      --yellow: #92400e;
      --yellow-soft: #fffbeb;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.07);
      --radius: 22px;
      --ring: 0 0 0 3px rgba(72, 183, 182, 0.2);
    }

    body {
      margin: 0;
      font-family: "Pretendard", "SUIT", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 360px at 5% -20%, rgba(72, 183, 182, 0.16) 0%, rgba(72, 183, 182, 0) 58%),
        radial-gradient(800px 300px at 100% 0, rgba(239, 157, 184, 0.1) 0%, rgba(239, 157, 184, 0) 60%),
        var(--bg);
    }

    .container { max-width: 980px; margin: 0 auto; padding: 20px 14px 72px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      font-weight: 700;
    }

    .top-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .link {
      text-decoration: none;
      color: var(--blue);
      font-weight: 800;
    }

    .link:hover { text-decoration: underline; }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: var(--blue-soft);
      color: var(--blue);
    }

    .chip.success { background: var(--green-soft); color: var(--green); }

    .notice {
      background: #f8fbfd;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 14px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .notice.success {
      background: var(--green-soft);
      border-color: #a7f3d0;
      color: #065f46;
    }

    .notice.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #b91c1c;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      border: 1px solid rgba(219, 228, 239, 0.9);
    }

    .card + .card { margin-top: 14px; }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: var(--blue-soft);
      color: var(--blue);
      white-space: nowrap;
    }

    .badge.yellow { background: var(--yellow-soft); color: var(--yellow); }
    .badge.green { background: var(--green-soft); color: var(--green); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .full { grid-column: 1 / -1; }

    .field-block {
      border: 1px solid #e5ebf3;
      border-radius: 16px;
      background: #f9fbfe;
      padding: 14px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 800;
      color: #516075;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .field-value {
      min-height: 24px;
      font-size: 15px;
      line-height: 1.7;
      color: #17212d;
      font-weight: 700;
      white-space: pre-wrap;
      word-break: break-word;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: rgba(72, 183, 182, 0.7);
      box-shadow: var(--ring);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
      align-items: center;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      padding: 11px 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    .btn.primary {
      background: linear-gradient(180deg, #48b7b6 0%, #2f9191 100%);
      color: #fff;
      box-shadow: 0 8px 16px rgba(47, 145, 145, 0.22);
    }

    .btn.secondary { background: var(--blue-soft); color: #236f6f; }
    .btn.outline {
      background: #fff;
      border: 1px solid var(--line);
      color: #0f172a;
    }

    .btn.disabled {
      opacity: 0.55;
      pointer-events: none;
    }

    .btn:hover { filter: brightness(1.02); }
    .btn:active { transform: translateY(1px); }

    @media (max-width: 820px) {
      .container { padding: 16px 10px 64px; }
      .title { font-size: 28px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1 class="title">AS 신청 상세</h1>
        <p class="sub">고객 신청 내용을 확인하고 처리 상태와 메모를 저장할 수 있습니다.</p>
      </div>
      <div class="top-links">
        <span id="sourceChip" class="chip">데이터 소스: -</span>
        <a id="backToAdminLink" class="link" href="./admin.html?view=as">관리자 페이지</a>
      </div>
    </div>

    <div id="topNotice" class="notice">AS 신청 정보를 불러오는 중입니다.</div>

    <section class="card">
      <div class="card-head">
        <div>
          <h2 class="section-title">고객 신청 내용</h2>
          <div id="requestMeta" class="muted">-</div>
        </div>
        <span id="requestStatusBadge" class="badge">접수중</span>
      </div>

      <div class="grid">
        <div class="field-block">
          <div class="field-label">고객명</div>
          <div id="fieldCustomerName" class="field-value">-</div>
        </div>
        <div class="field-block">
          <div class="field-label">연락처</div>
          <div id="fieldPhone" class="field-value">-</div>
        </div>
        <div class="field-block">
          <div class="field-label">계약번호</div>
          <div id="fieldContractNo" class="field-value">-</div>
        </div>
        <div class="field-block">
          <div class="field-label">시공자</div>
          <div id="fieldInstallerName" class="field-value">-</div>
        </div>
        <div class="field-block">
          <div class="field-label">제품</div>
          <div id="fieldProduct" class="field-value">-</div>
        </div>
        <div class="field-block">
          <div class="field-label">시공일자</div>
          <div id="fieldInstallDate" class="field-value">-</div>
        </div>
        <div class="field-block full">
          <div class="field-label">주소</div>
          <div id="fieldAddress" class="field-value">-</div>
        </div>
        <div class="field-block">
          <div class="field-label">AS 유형</div>
          <div id="fieldRequestType" class="field-value">-</div>
        </div>
        <div class="field-block">
          <div class="field-label">희망 연락 시간</div>
          <div id="fieldContactTime" class="field-value">-</div>
        </div>
        <div class="field-block full">
          <div class="field-label">고객 신청 내용</div>
          <div id="fieldRequestDetail" class="field-value">-</div>
        </div>
      </div>

      <div class="actions">
        <a id="contractLinkBtn" class="btn outline disabled" href="./admin.html?view=as">계약서 보기</a>
        <button id="refreshBtn" class="btn secondary" type="button">새로고침</button>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title" style="margin-bottom:14px;">처리 내용</h2>

      <form id="asProcessForm">
        <div class="grid">
          <div>
            <label for="asStatusInput">처리 상태</label>
            <select id="asStatusInput">
              <option value="접수중">접수중</option>
              <option value="처리중">처리중</option>
              <option value="처리완료">처리완료</option>
            </select>
          </div>
          <div>
            <label for="asCompletedAtInput">완료일</label>
            <input id="asCompletedAtInput" readonly placeholder="처리완료 시 자동 입력" />
          </div>
          <div class="full">
            <label for="asNoteInput">처리 메모</label>
            <textarea id="asNoteInput" placeholder="처리 내용과 고객 안내사항을 입력하세요."></textarea>
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" type="submit">처리 내용 저장</button>
          <a class="btn outline" href="./admin.html?view=as">목록으로 돌아가기</a>
        </div>
      </form>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'aikongkong_contract_as_v2';
    const ENTRY_SESSION_KEY = 'aikongkong_entry_session_v1';
    const SHEETS_API_URL_KEY = 'aikongkong_sheets_api_url';
    const INSTALLER_PROFILE_KEY = 'aikongkong_installer_profile_v1';
    const DEFAULT_SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbyKNzu0YgVz5nuwldhlH5XyJefzvBMPT68B3LfrcRzvdiDw5TzKqe7KsRASdk3AcaP6/exec';
    const REMOTE_FETCH_TIMEOUT_MS = 20000;

    const state = {
      contracts: [],
      asRequests: [],
      source: 'local',
      currentAdmin: null,
      installerProfile: null,
      currentRequest: null,
      linkedContract: null
    };

    const $ = (selector) => document.querySelector(selector);
    const toDigits = (value) => String(value || '').replace(/[^0-9]/g, '');

    function todayString() {
      return new Date().toISOString().split('T')[0];
    }

    function normalizeText(value) {
      return String(value || '').trim().toLowerCase();
    }

    function getSheetsApiUrl() {
      const fromLocal = String(localStorage.getItem(SHEETS_API_URL_KEY) || '').trim();
      return fromLocal || DEFAULT_SHEETS_API_URL;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = REMOTE_FETCH_TIMEOUT_MS) {
      const controller = typeof AbortController === 'function' ? new AbortController() : null;
      let timeoutId = 0;
      const timeoutMessage = `연동 대기시간 초과 (${Math.ceil(timeoutMs / 1000)}초)`;
      const timeoutPromise = new Promise((_, reject) => {
        timeoutId = window.setTimeout(() => {
          if (controller) controller.abort();
          reject(new Error(timeoutMessage));
        }, timeoutMs);
      });

      try {
        return await Promise.race([
          fetch(url, {
            ...options,
            ...(controller ? { signal: controller.signal } : {})
          }).catch((err) => {
            if (controller && err?.name === 'AbortError') {
              throw new Error(timeoutMessage);
            }
            throw err;
          }),
          timeoutPromise
        ]);
      } finally {
        if (timeoutId) window.clearTimeout(timeoutId);
      }
    }

    function saveLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ contracts: state.contracts, asRequests: state.asRequests }));
    }

    function normalizeAsRequestItem(item, idx = 0) {
      const normalized = { ...(item || {}) };
      if (!normalized.requestType && normalized.asType) normalized.requestType = normalized.asType;
      if (!normalized.createdAt && normalized.requestDate) normalized.createdAt = normalized.requestDate;
      if (!normalized.status) normalized.status = '접수중';
      if (!normalized.id) normalized.id = String(normalized.asNo || '').trim() || `as_legacy_${idx + 1}`;
      return normalized;
    }

    function loadLocal() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        state.contracts = [];
        state.asRequests = [];
        return;
      }

      const parsed = JSON.parse(raw);
      state.contracts = Array.isArray(parsed.contracts) ? parsed.contracts : [];
      state.asRequests = Array.isArray(parsed.asRequests)
        ? parsed.asRequests.map((item, idx) => normalizeAsRequestItem(item, idx))
        : [];
    }

    function getLocalContractsBackup() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed.contracts) ? parsed.contracts : [];
      } catch (_) {
        return [];
      }
    }

    const CONTRACT_FALLBACK_KEYS = [
      'contractNo',
      'customerName',
      'phone',
      'address',
      'product',
      'productItems',
      'color',
      'totalPrice',
      'paymentMethod',
      'paymentSummary',
      'installDate',
      'docYear',
      'docMonth',
      'docDay',
      'installRound',
      'discountTypes',
      'discountEtc',
      'installNote',
      'customerSignName',
      'installerSignName',
      'signatureImage',
      'installerName',
      'installerPhone',
      'installerAddress',
      'installerSignatureImage',
      'createdAt',
      'updatedAt'
    ];

    function hasContractValue(value) {
      if (value == null) return false;
      if (typeof value === 'string') return value.trim() !== '';
      return true;
    }

    function mergeContractRecordWithLocal(remoteItem, localItem) {
      const merged = { ...(remoteItem || {}) };
      if (!localItem) return merged;

      CONTRACT_FALLBACK_KEYS.forEach((key) => {
        if (!hasContractValue(merged[key]) && hasContractValue(localItem[key])) {
          merged[key] = localItem[key];
        }
      });

      ['phone', 'installerPhone'].forEach((key) => {
        const mergedDigits = toDigits(merged[key]);
        const localDigits = toDigits(localItem[key]);
        if (localDigits.length > mergedDigits.length) {
          merged[key] = localItem[key];
        }
      });

      return merged;
    }

    function mergeContractFieldsFromLocal(remoteContracts) {
      const localMap = new Map(
        getLocalContractsBackup()
          .filter((item) => item && item.id)
          .map((item) => [String(item.id), item])
      );

      const mergedList = (remoteContracts || []).map((item) => {
        const local = localMap.get(String(item.id || ''));
        const merged = mergeContractRecordWithLocal(item, local);
        localMap.delete(String(item.id || ''));
        return merged;
      });

      localMap.forEach((item) => mergedList.push(item));
      return mergedList;
    }

    async function loadRemote() {
      const apiUrl = getSheetsApiUrl();
      if (!apiUrl) throw new Error('구글시트 API URL이 설정되지 않았습니다.');

      const sep = apiUrl.includes('?') ? '&' : '?';
      const res = await fetchWithTimeout(`${apiUrl}${sep}action=load&t=${Date.now()}`, {
        method: 'GET',
        cache: 'no-store'
      });
      if (!res.ok) throw new Error(`연동 서버 응답 오류 (${res.status})`);

      const data = await res.json();
      if (!data.ok) throw new Error(data.error || '구글시트 데이터 로드 실패');

      const remoteContracts = Array.isArray(data.contracts) ? data.contracts : [];
      state.contracts = mergeContractFieldsFromLocal(remoteContracts);
      state.asRequests = Array.isArray(data.asRequests)
        ? data.asRequests.map((item, idx) => normalizeAsRequestItem(item, idx))
        : [];
      state.source = 'sheets';
      saveLocal();
    }

    async function postRemote(action, payload) {
      const apiUrl = getSheetsApiUrl();
      if (!apiUrl) throw new Error('구글시트 API URL이 설정되지 않았습니다.');

      const res = await fetchWithTimeout(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, ...payload })
      });

      if (!res.ok) throw new Error(`연동 서버 응답 오류 (${res.status})`);

      const data = await res.json();
      if (!data.ok) throw new Error(data.error || '구글시트 저장 실패');
      return data;
    }

    async function loadData() {
      const apiUrl = getSheetsApiUrl();
      if (apiUrl) {
        try {
          await loadRemote();
          return;
        } catch (_) {
          loadLocal();
          state.source = 'local';
          return;
        }
      }

      loadLocal();
      state.source = 'local';
    }

    function loadEntrySession() {
      try {
        const raw = sessionStorage.getItem(ENTRY_SESSION_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function guardAdminAccess() {
      const entry = loadEntrySession();
      if (!entry || entry.role !== 'admin') {
        alert('관리자 정보로 로그인 후 접근해주세요.');
        location.replace('./index.html');
        return null;
      }
      return entry;
    }

    function loadInstallerProfile(defaultProfile = {}) {
      let parsed = null;
      try {
        const raw = localStorage.getItem(INSTALLER_PROFILE_KEY);
        parsed = raw ? JSON.parse(raw) : null;
      } catch (_) {
        parsed = null;
      }

      return {
        name: String(parsed?.name || defaultProfile?.name || '').trim(),
        phone: toDigits(parsed?.phone || defaultProfile?.phone || '')
      };
    }

    function getCurrentInstallerName() {
      const fromProfile = String(state.installerProfile?.name || '').trim();
      if (fromProfile) return fromProfile;
      return String(state.currentAdmin?.name || '').trim();
    }

    function getCurrentInstallerPhone() {
      const fromProfile = toDigits(state.installerProfile?.phone || '');
      if (fromProfile) return fromProfile;
      return toDigits(state.currentAdmin?.phone || '');
    }

    function belongsToCurrentInstaller(item) {
      const installerName = normalizeText(getCurrentInstallerName());
      const installerPhone = getCurrentInstallerPhone();
      if (!installerName && !installerPhone) return false;

      const itemInstallerPhone = toDigits(item?.installerPhone);
      const itemInstallerName = normalizeText(item?.installerName);

      if (installerPhone) {
        if (itemInstallerPhone) return itemInstallerPhone === installerPhone;
        if (installerName) return itemInstallerName === installerName;
        return false;
      }

      return installerName && itemInstallerName === installerName;
    }

    function findContractById(contractId) {
      const targetId = String(contractId || '').trim();
      if (!targetId) return null;
      return state.contracts.find((item) => String(item?.id || '').trim() === targetId) || null;
    }

    function findContractForAsRequest(item) {
      const contractId = String(item?.contractId || '').trim();
      if (contractId) {
        const byId = findContractById(contractId);
        if (byId) return byId;
      }

      const contractNo = String(item?.contractNo || '').trim();
      if (contractNo) {
        const byContractNo = state.contracts.find((contract) => String(contract?.contractNo || '').trim() === contractNo);
        if (byContractNo) return byContractNo;
      }

      const phone = toDigits(item?.phone);
      const customerName = normalizeText(item?.customerName);
      if (!phone && !customerName) return null;

      return state.contracts.find((contract) => {
        const samePhone = phone && toDigits(contract?.phone) === phone;
        const sameName = customerName && normalizeText(contract?.customerName) === customerName;
        if (phone && customerName) return samePhone && sameName;
        return samePhone || sameName;
      }) || null;
    }

    function getQueryAsId() {
      return String(new URLSearchParams(location.search).get('id') || '').trim();
    }

    function findAccessibleRequest() {
      const targetId = getQueryAsId();
      if (!targetId) return null;

      const target = state.asRequests.find((item) => String(item?.id || '') === targetId) || null;
      if (!target) return null;

      const directInstallerMatch = belongsToCurrentInstaller(target);
      const linkedContract = findContractForAsRequest(target);
      if (!directInstallerMatch && (!linkedContract || !belongsToCurrentInstaller(linkedContract))) {
        return null;
      }

      state.linkedContract = linkedContract;
      return target;
    }

    function updateSourceChip() {
      const el = $('#sourceChip');
      if (state.source === 'sheets') {
        el.textContent = '데이터 소스: Google Sheets';
        el.className = 'chip success';
      } else {
        el.textContent = '데이터 소스: Local Backup';
        el.className = 'chip';
      }
    }

    function setTopNotice(text, type = '') {
      const el = $('#topNotice');
      el.className = `notice ${type}`.trim();
      el.textContent = text;
    }

    function setFieldText(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = String(value || '-');
    }

    function formatDateTime(value) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value || '-';
      return d.toLocaleString('ko-KR');
    }

    function formatDateOnly(value) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value || '-';
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function getStatusBadgeClass(status) {
      if (status === '처리완료') return 'badge green';
      if (status === '처리중') return 'badge yellow';
      return 'badge';
    }

    function setStatusBadge(status) {
      const el = $('#requestStatusBadge');
      el.className = getStatusBadgeClass(status);
      el.textContent = status || '접수중';
    }

    function upsertAsRequestState(request) {
      if (!request || !request.id) return;
      const idx = state.asRequests.findIndex((item) => String(item?.id || '') === String(request.id));
      if (idx === -1) state.asRequests.push(request);
      else state.asRequests[idx] = request;
    }

    function setFormDisabled(disabled) {
      $('#asStatusInput').disabled = disabled;
      $('#asNoteInput').disabled = disabled;
      $('#asProcessForm button[type="submit"]').disabled = disabled;
    }

    function updateContractLink(contract) {
      const link = $('#contractLinkBtn');
      if (contract && contract.id) {
        link.href = `./contract.html?id=${encodeURIComponent(String(contract.id || ''))}`;
        link.textContent = '계약서 보기';
        link.classList.remove('disabled');
        return;
      }

      link.href = './admin.html?view=as';
      link.textContent = '계약 정보 없음';
      link.classList.add('disabled');
    }

    function syncCompletedAtField() {
      const status = $('#asStatusInput').value;
      if (status === '처리완료') {
        $('#asCompletedAtInput').value = state.currentRequest?.completedAt || todayString();
      } else {
        $('#asCompletedAtInput').value = '';
      }
    }

    function renderRequest(request) {
      state.currentRequest = request;
      state.linkedContract = findContractForAsRequest(request);

      const contract = state.linkedContract;
      const contractNo = contract?.contractNo || request.contractNo || '-';
      const installerName = contract?.installerName || request.installerName || '-';
      const product = request.product || contract?.product || '-';
      const address = request.address || contract?.address || '-';
      const installDate = contract?.installDate || '-';

      $('#requestMeta').textContent = `${request.asNo || '-'} · 접수일 ${formatDateTime(request.createdAt)}`;
      setStatusBadge(request.status);

      setFieldText('fieldCustomerName', request.customerName || contract?.customerName || '-');
      setFieldText('fieldPhone', request.phone || contract?.phone || '-');
      setFieldText('fieldContractNo', contractNo);
      setFieldText('fieldInstallerName', installerName);
      setFieldText('fieldProduct', product);
      setFieldText('fieldInstallDate', formatDateOnly(installDate));
      setFieldText('fieldAddress', address);
      setFieldText('fieldRequestType', request.requestType || request.asType || '-');
      setFieldText('fieldContactTime', request.contactTime || '-');
      setFieldText('fieldRequestDetail', request.requestDetail || '-');

      $('#asStatusInput').value = request.status || '접수중';
      $('#asNoteInput').value = request.techNote || '';
      $('#asCompletedAtInput').value = request.status === '처리완료'
        ? (request.completedAt || todayString())
        : '';

      updateContractLink(contract);
      updateSourceChip();
      setFormDisabled(false);
    }

    async function refreshRequest(showMessage = false) {
      await loadData();
      updateSourceChip();

      const request = findAccessibleRequest();
      if (!request) {
        setFormDisabled(true);
        updateContractLink(null);
        setTopNotice('해당 AS 신청을 찾을 수 없거나 현재 관리자에게 표시할 수 없는 내역입니다.', 'error');
        return;
      }

      renderRequest(request);
      setTopNotice(showMessage ? 'AS 신청 정보를 새로고침했습니다.' : 'AS 신청 정보를 불러왔습니다.', 'success');
    }

    $('#asStatusInput').addEventListener('change', () => {
      syncCompletedAtField();
      setStatusBadge($('#asStatusInput').value);
    });

    $('#refreshBtn').addEventListener('click', async () => {
      await refreshRequest(true);
    });

    $('#asProcessForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!state.currentRequest) return;

      const status = $('#asStatusInput').value || '접수중';
      const techNote = $('#asNoteInput').value || '';
      const patch = normalizeAsRequestItem({
        ...state.currentRequest,
        status,
        techNote,
        updatedAt: new Date().toISOString(),
        completedAt: status === '처리완료'
          ? ($('#asCompletedAtInput').value || todayString())
          : ''
      });

      try {
        const data = await postRemote('saveAsRequest', { asRequest: patch });
        const saved = normalizeAsRequestItem(data.asRequest || patch);
        upsertAsRequestState(saved);
        state.currentRequest = saved;
        saveLocal();
        state.source = 'sheets';
        renderRequest(saved);
        setTopNotice('AS 처리 내용이 저장되었습니다.', 'success');
      } catch (err) {
        upsertAsRequestState(patch);
        state.currentRequest = patch;
        saveLocal();
        state.source = 'local';
        renderRequest(patch);
        setTopNotice(`원격 저장 실패로 로컬에 우선 반영했습니다: ${err.message}`, 'error');
      }
    });

    function enableDevAutoReload() {
      if (location.protocol !== 'http:' && location.protocol !== 'https:') return;
      if (!(location.hostname === 'localhost' || location.hostname === '127.0.0.1')) return;

      let lastModified = null;
      setInterval(async () => {
        try {
          const res = await fetch(location.href.split('#')[0], { method: 'HEAD', cache: 'no-store' });
          const next = res.headers.get('Last-Modified');
          if (!next) return;
          if (lastModified && next !== lastModified) {
            location.reload();
            return;
          }
          lastModified = next;
        } catch (_) {}
      }, 1200);
    }

    (async function init() {
      const entry = guardAdminAccess();
      if (!entry) return;

      state.currentAdmin = {
        name: String(entry.name || '').trim(),
        phone: toDigits(entry.phone || '')
      };
      state.installerProfile = loadInstallerProfile({
        name: entry.name,
        phone: entry.phone
      });

      if (!String(localStorage.getItem(SHEETS_API_URL_KEY) || '').trim()) {
        localStorage.setItem(SHEETS_API_URL_KEY, DEFAULT_SHEETS_API_URL);
      }

      await refreshRequest(false);
      enableDevAutoReload();
    })();
  </script>
</body>
</html>
