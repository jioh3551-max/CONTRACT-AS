      .brand-wrap { margin-bottom: 2mm; }

      .line-block { border-top-width: 0.5mm; margin-top: 1mm; }
      .line-row {
        min-height: 8.4mm;
        padding: 1mm 1.5mm;
        border-bottom-width: 0.26mm;
      }

      .line-row.multiline {
        min-height: 22mm;
      }

      .line-label {
        min-width: 32mm;
        font-size: 4mm;
      }

      .line-value {

      .terms {

      .term-col h3 {

      }

        grid-template-columns: 3.2mm minmax(0, 1fr);
        column-gap: 1mm;
      }

      .policy-check,

        font-size: 2.95mm;
        line-height: 1.34;
      }

      .sign-area {
        margin-top: 2.2mm;
        width: 84mm;
        border-top-width: 0.4mm;
        padding-top: 1.6mm;
      }

      .date-row {
        gap: 2mm;
        margin-bottom: 1.2mm;
        font-size: 3.2mm;
      }

      .date-number {
        width: 15mm;
        min-height: 6mm;
        font-size: 4.9mm;
        line-height: 1.05;
        border-bottom-width: 0.26mm;
      }

      .sign-row {
        grid-template-columns: 15mm 1fr auto 20mm;
        gap: 1.8mm;
        margin-top: 1mm;
      }

      .sign-label,
      .sign-name {
        font-size: 4.5mm;
      }

      .sign-name {
        min-height: 6.3mm;
        padding: 0 0.6mm 0.5mm;
        border-bottom-width: 0.26mm;
      }

      .sign-mark { font-size: 3.6mm; }

      .sign-img {
        width: 19mm;
        height: 7mm;
      }
    }
  </style>

  <script>
    const STORAGE_KEY = 'aikongkong_contract_as_v2';
    const ENTRY_SESSION_KEY = 'aikongkong_entry_session_v1';
    const SHEETS_API_URL_KEY = 'aikongkong_sheets_api_url';
    const INSTALLER_PROFILE_KEY = 'aikongkong_installer_profile_v1';
    const DEFAULT_SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbyKNzu0YgVz5nuwldhlH5XyJefzvBMPT68B3LfrcRzvdiDw5TzKqe7KsRASdk3AcaP6/exec';
    const REMOTE_FETCH_TIMEOUT_MS = 20000;

    const state = {
      contracts: [],
      asRequests: [],
      source: 'local',
      currentAdmin: null,
      installerProfile: null,
      currentRequest: null,
      linkedContract: null,
      isSaving: false,
      customerSignaturePad: null,
      installerSignaturePad: null
    };

    const CONTRACT_FALLBACK_KEYS = [
      'contractNo', 'customerName', 'phone', 'address', 'product', 'productItems', 'color',
      'totalPrice', 'paymentMethod', 'paymentSummary', 'installDate', 'docYear', 'docMonth',
      'docDay', 'installRound', 'discountTypes', 'discountEtc', 'installNote', 'customerSignName',
      'installerSignName', 'signatureImage', 'installerName', 'installerPhone', 'installerAddress',
      'installerSignatureImage', 'createdAt', 'updatedAt'
    ];

    const $ = (selector) => document.querySelector(selector);
    const toDigits = (value) => String(value || '').replace(/[^0-9]/g, '');

    function todayString() {
      return new Date().toISOString().split('T')[0];
    }

    function normalizeText(value) {
      return String(value || '').trim().toLowerCase();
    }

    function cleanText(value) {
      const text = String(value == null ? '' : value).trim();
      return text && text !== '-' ? text : '';
    }

    function displayText(value, fallback = '-') {
      const text = cleanText(value);
      return text || fallback;
    }

    function getSheetsApiUrl() {
      const fromLocal = String(localStorage.getItem(SHEETS_API_URL_KEY) || '').trim();
      return fromLocal || DEFAULT_SHEETS_API_URL;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = REMOTE_FETCH_TIMEOUT_MS) {
      const controller = typeof AbortController === 'function' ? new AbortController() : null;
      let timeoutId = 0;
      const timeoutMessage = `?곕룞 ?湲곗떆媛?珥덇낵 (${Math.ceil(timeoutMs / 1000)}珥?`;
      const timeoutPromise = new Promise((_, reject) => {
        timeoutId = window.setTimeout(() => {
          if (controller) controller.abort();
          reject(new Error(timeoutMessage));
        }, timeoutMs);
      });

      try {
        return await Promise.race([
          fetch(url, {
            ...options,
            ...(controller ? { signal: controller.signal } : {})
          }).catch((err) => {
            if (controller && err?.name === 'AbortError') throw new Error(timeoutMessage);
            throw err;
          }),
          timeoutPromise
        ]);
      } finally {
        if (timeoutId) window.clearTimeout(timeoutId);
      }
    }

    function saveLocal() {
      const contracts = Array.isArray(state.contracts) ? state.contracts : [];
      const asRequests = Array.isArray(state.asRequests) ? state.asRequests : [];
      if (!contracts.length && !asRequests.length) {
        localStorage.removeItem(STORAGE_KEY);
        return;
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ contracts, asRequests }));
    }

    function normalizeRequestImages(item) {
      const directList = Array.isArray(item?.requestImages) ? item.requestImages : [];
      const fields = [item?.requestImage1, item?.requestImage2, item?.requestImage3, item?.requestImage4];
      return [...directList, ...fields]
        .map((value) => String(value || '').trim())
        .filter(Boolean)
        .filter((value, index, list) => list.indexOf(value) === index)
        .slice(0, 4);
    }

    function applyRequestImageFields(target, images) {
      const list = Array.isArray(images) ? images.slice(0, 4) : [];
      target.requestImages = list;
      for (let i = 0; i < 4; i += 1) {
        target[`requestImage${i + 1}`] = list[i] || '';
      }
      return target;
    }

    function normalizeAsRequestItem(item, idx = 0) {
      const normalized = { ...(item || {}) };
      if (!normalized.requestType && normalized.asType) normalized.requestType = normalized.asType;
      if (!normalized.createdAt && normalized.requestDate) normalized.createdAt = normalized.requestDate;
      if (!normalized.status) normalized.status = '?묒닔以?;
      if (!normalized.id) normalized.id = String(normalized.asNo || '').trim() || `as_legacy_${idx + 1}`;
      normalized.customerSignName = String(normalized.customerSignName || '').trim();
      normalized.installerSignName = String(normalized.installerSignName || '').trim();
      normalized.signatureImage = String(normalized.signatureImage || '').trim();
      normalized.installerSignatureImage = String(normalized.installerSignatureImage || '').trim();
      applyRequestImageFields(normalized, normalizeRequestImages(normalized));
      return normalized;
    }

    function loadLocal() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        state.contracts = [];
        state.asRequests = [];
        return;
      }

      const parsed = JSON.parse(raw);
      state.contracts = Array.isArray(parsed.contracts) ? parsed.contracts : [];
      state.asRequests = Array.isArray(parsed.asRequests)
        ? parsed.asRequests.map((item, idx) => normalizeAsRequestItem(item, idx))
        : [];
    }

    function getLocalContractsBackup() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed.contracts) ? parsed.contracts : [];
      } catch (_) {
        return [];
      }
    }

    function hasContractValue(value) {
      if (value == null) return false;
      if (typeof value === 'string') return value.trim() !== '';
      return true;
    }

    function mergeContractRecordWithLocal(remoteItem, localItem) {
      const merged = { ...(remoteItem || {}) };
      if (!localItem) return merged;

      CONTRACT_FALLBACK_KEYS.forEach((key) => {
        if (!hasContractValue(merged[key]) && hasContractValue(localItem[key])) {
          merged[key] = localItem[key];
        }
      });

      ['phone', 'installerPhone'].forEach((key) => {
        const mergedDigits = toDigits(merged[key]);
        const localDigits = toDigits(localItem[key]);
        if (localDigits.length > mergedDigits.length) {
          merged[key] = localItem[key];
        }
      });

      return merged;
    }

    function mergeContractFieldsFromLocal(remoteContracts) {
      const localMap = new Map(
        getLocalContractsBackup()
          .filter((item) => item && item.id)
          .map((item) => [String(item.id), item])
      );

      const mergedList = (remoteContracts || []).map((item) => {
        const local = localMap.get(String(item.id || ''));
        const merged = mergeContractRecordWithLocal(item, local);
        localMap.delete(String(item.id || ''));
        return merged;
      });

      return mergedList;
    }

    async function loadRemote() {
      const apiUrl = getSheetsApiUrl();
      if (!apiUrl) throw new Error('援ш??쒗듃 API URL???ㅼ젙?섏? ?딆븯?듬땲??');

      const sep = apiUrl.includes('?') ? '&' : '?';
      const res = await fetchWithTimeout(`${apiUrl}${sep}action=load&t=${Date.now()}`, {
        method: 'GET',
        cache: 'no-store'
      });
      if (!res.ok) throw new Error(`?곕룞 ?쒕쾭 ?묐떟 ?ㅻ쪟 (${res.status})`);

      const data = await res.json();
      if (!data.ok) throw new Error(data.error || '援ш??쒗듃 ?곗씠??濡쒕뱶 ?ㅽ뙣');

      const remoteContracts = Array.isArray(data.contracts) ? data.contracts : [];
      state.contracts = mergeContractFieldsFromLocal(remoteContracts);
      state.asRequests = Array.isArray(data.asRequests)
        ? data.asRequests.map((item, idx) => normalizeAsRequestItem(item, idx))
        : [];
      state.source = 'sheets';
      saveLocal();
    }

    async function postRemote(action, payload) {
      const apiUrl = getSheetsApiUrl();
      if (!apiUrl) throw new Error('援ш??쒗듃 API URL???ㅼ젙?섏? ?딆븯?듬땲??');

      const res = await fetchWithTimeout(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, ...payload })
      });

      if (!res.ok) throw new Error(`?곕룞 ?쒕쾭 ?묐떟 ?ㅻ쪟 (${res.status})`);

      const data = await res.json();
      if (!data.ok) throw new Error(data.error || '援ш??쒗듃 ????ㅽ뙣');
      return data;
    }

    async function loadData() {
      const apiUrl = getSheetsApiUrl();
      if (apiUrl) {
        try {
          await loadRemote();
          return;
        } catch (_) {
          loadLocal();
          state.source = 'local';
          return;
        }
      }

      loadLocal();
      state.source = 'local';
    }

    function loadEntrySession() {
      try {
        const raw = sessionStorage.getItem(ENTRY_SESSION_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function guardAdminAccess() {
      const entry = loadEntrySession();
      if (!entry || entry.role !== 'admin') {
        alert('愿由ъ옄 ?뺣낫濡?濡쒓렇?명븳 ???댁슜?댁＜?몄슂.');
        location.replace('./index.html');
        return null;
      }
      return entry;
    }

    function normalizeInstallerProfileRecord(profile, defaultProfile = {}) {
      const source = profile && typeof profile === 'object' ? profile : {};
      return {
        name: String(source.name || defaultProfile?.name || '').trim(),
        phone: toDigits(source.phone || defaultProfile?.phone || ''),
        address: String(source.address || defaultProfile?.address || '').trim(),
        signatureImage: String(source.signatureImage || ''),
        savedAt: String(source.savedAt || ''),
        signatureSavedAt: String(source.signatureSavedAt || source.savedAt || '')
      };
    }

    function getInstallerProfileOwnerKey(fallbackOwner = {}) {
      const ownerPhone = toDigits(state.currentAdmin?.phone || fallbackOwner?.phone || '');
      if (ownerPhone) return `phone:${ownerPhone}`;
      const ownerName = normalizeText(state.currentAdmin?.name || fallbackOwner?.name || '');
      if (ownerName) return `name:${ownerName}`;
      return 'default';
    }

    function readInstallerProfileStore() {
      let parsed = null;
      try {
        const raw = localStorage.getItem(INSTALLER_PROFILE_KEY);
        parsed = raw ? JSON.parse(raw) : null;
      } catch (_) {
        parsed = null;
      }

      if (parsed && typeof parsed === 'object' && parsed.version === 2 && parsed.profiles && typeof parsed.profiles === 'object') {
        return {
          version: 2,
          profiles: parsed.profiles,
          legacyProfile: parsed.legacyProfile && typeof parsed.legacyProfile === 'object' ? parsed.legacyProfile : null
        };
      }

      return {
        version: 2,
        profiles: {},
        legacyProfile: parsed && typeof parsed === 'object' ? parsed : null
      };
    }

    function getLegacyInstallerProfileForCurrentAdmin(legacyProfile, defaultProfile = {}) {
      if (!legacyProfile || typeof legacyProfile !== 'object') return null;

      const adminPhone = toDigits(state.currentAdmin?.phone || defaultProfile?.phone || '');
      const adminName = normalizeText(state.currentAdmin?.name || defaultProfile?.name || '');
      const legacyPhone = toDigits(legacyProfile.phone || '');
      const legacyName = normalizeText(legacyProfile.name || '');

      if (adminPhone && legacyPhone && adminPhone === legacyPhone) return legacyProfile;
      if (adminName && legacyName && adminName === legacyName) return legacyProfile;
      if (!adminPhone && !adminName) return legacyProfile;
      return null;
    }

    function loadInstallerProfile(defaultProfile = {}) {
      const store = readInstallerProfileStore();
      const ownerKey = getInstallerProfileOwnerKey(defaultProfile);
      const scopedProfile = store.profiles?.[ownerKey];
      if (scopedProfile) return normalizeInstallerProfileRecord(scopedProfile, defaultProfile);

      const legacyProfile = getLegacyInstallerProfileForCurrentAdmin(store.legacyProfile, defaultProfile);
      return normalizeInstallerProfileRecord(legacyProfile, defaultProfile);
    }

    function getCurrentInstallerName() {
      const fromProfile = String(state.installerProfile?.name || '').trim();
      if (fromProfile) return fromProfile;
      return String(state.currentAdmin?.name || '').trim();
    }

    function getCurrentInstallerPhone() {
      const fromProfile = toDigits(state.installerProfile?.phone || '');
      if (fromProfile) return fromProfile;
      return toDigits(state.currentAdmin?.phone || '');
    }

    function belongsToCurrentInstaller(item) {
      const installerName = normalizeText(getCurrentInstallerName());
      const installerPhone = getCurrentInstallerPhone();
      if (!installerName && !installerPhone) return false;

      const itemInstallerPhone = toDigits(item?.installerPhone);
      const itemInstallerName = normalizeText(item?.installerName);

      if (installerPhone) {
        if (itemInstallerPhone) return itemInstallerPhone === installerPhone;
        if (installerName) return itemInstallerName === installerName;
        return false;
      }

      return installerName && itemInstallerName === installerName;
    }

    function findContractById(contractId) {
      const targetId = String(contractId || '').trim();
      if (!targetId) return null;
      return state.contracts.find((item) => String(item?.id || '').trim() === targetId) || null;
    }

    function findContractForAsRequest(item) {
      const contractId = String(item?.contractId || '').trim();
      if (contractId) {
        const byId = findContractById(contractId);
        if (byId) return byId;
      }

      const contractNo = String(item?.contractNo || '').trim();
      if (contractNo) {
        const byContractNo = state.contracts.find((contract) => String(contract?.contractNo || '').trim() === contractNo);
        if (byContractNo) return byContractNo;
      }

      const phone = toDigits(item?.phone);
      const customerName = normalizeText(item?.customerName);
      if (!phone && !customerName) return null;

      return state.contracts.find((contract) => {
        const samePhone = phone && toDigits(contract?.phone) === phone;
        const sameName = customerName && normalizeText(contract?.customerName) === customerName;
        if (phone && customerName) return samePhone && sameName;
        return samePhone || sameName;
      }) || null;
    }

    function getQueryAsId() {
      return String(new URLSearchParams(location.search).get('id') || '').trim();
    }

    function findAccessibleRequest() {
      const targetId = getQueryAsId();
      if (!targetId) return null;

      const target = state.asRequests.find((item) => String(item?.id || '') === targetId) || null;
      if (!target) return null;

      const directInstallerMatch = belongsToCurrentInstaller(target);
      const linkedContract = findContractForAsRequest(target);
      if (!directInstallerMatch && (!linkedContract || !belongsToCurrentInstaller(linkedContract))) {
        return null;
      }

      state.linkedContract = linkedContract;
      return target;
    }

    function formatDateTime(value) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value || '-';
      return d.toLocaleString('ko-KR');
    }

    function formatDateOnly(value) {
      const text = cleanText(value);
      if (!text) return '-';
      const d = new Date(text);
      if (Number.isNaN(d.getTime())) return text;
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function dateParts(value) {
      const raw = cleanText(value) || todayString();
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) {
        const match = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (match) return { year: match[1], month: String(Number(match[2])), day: String(Number(match[3])) };
        return { year: '-', month: '-', day: '-' };
      }
      return {
        year: String(d.getFullYear()),
        month: String(d.getMonth() + 1),
        day: String(d.getDate())
      };
    }

    function getStatusBadgeClass(status) {
      if (status === '泥섎━?꾨즺') return 'badge green';
      if (status === '泥섎━以?) return 'badge yellow';

    }

    function setStatusBadge(status) {

    function resolveProductText(request, contract) {
      return cleanText(request?.product) || cleanText(contract?.productItems) || cleanText(contract?.product) || '-';

      const link = $('#requestDetailLink');

    function updatePaperSignature(id, value) {
      const img = document.getElementById(id);
      if (!img) return;
      const src = String(value || '').trim();
      img.src = src;
      img.classList.toggle('active', !!src);
    }

    function createSignaturePad(canvas, clearBtn, options = {}) {
      if (!canvas || !clearBtn) return null;

      const ctx = canvas.getContext('2d');
      let drawing = false;
      let hasStroke = false;
      let lastX = 0;
      let lastY = 0;

      function setDrawingStyle() {
        ctx.lineWidth = 3.8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#111827';
      }

      function saveCurrentValue() {
        const value = hasStroke ? canvas.toDataURL('image/png') : '';
        if (typeof options.onChange === 'function') options.onChange(value);
      }

      function clearCanvas(emitChange = true) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hasStroke = false;
        if (emitChange && typeof options.onChange === 'function') options.onChange('');
      }

      function resizeCanvas(keepDrawing = true) {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        const rect = canvas.getBoundingClientRect();
        const prev = keepDrawing && hasStroke ? canvas.toDataURL('image/png') : '';

        canvas.width = Math.max(1, Math.floor(rect.width * ratio));
        canvas.height = Math.max(1, Math.floor(rect.height * ratio));

        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(ratio, ratio);
        setDrawingStyle();

        if (prev) {
          const img = new Image();
          img.onload = () => {
            ctx.drawImage(img, 0, 0, rect.width, rect.height);
            hasStroke = true;
            saveCurrentValue();
          };
          img.src = prev;
        }
      }

      function pointFromClient(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: clientX - rect.left, y: clientY - rect.top };
      }

      function startDraw(x, y) {
        drawing = true;
        hasStroke = true;
        lastX = x;
        lastY = y;

        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + 0.01, y + 0.01);
        ctx.stroke();
      }

      function moveDraw(x, y) {
        if (!drawing) return;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
        lastX = x;
        lastY = y;
      }

      function endDraw() {
        if (!drawing) return;
        drawing = false;
        saveCurrentValue();
      }

      function setValue(dataUrl) {
        clearCanvas(false);
        if (!dataUrl) {
          saveCurrentValue();
          return;
        }

        const rect = canvas.getBoundingClientRect();
        const img = new Image();
        img.onload = () => {
          ctx.drawImage(img, 0, 0, rect.width, rect.height);
          hasStroke = true;
          saveCurrentValue();
        };
        img.src = dataUrl;
      }

      function getValue() {
        return hasStroke ? canvas.toDataURL('image/png') : '';
      }

      canvas.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        const p = pointFromClient(e.clientX, e.clientY);
        startDraw(p.x, p.y);
      });

      canvas.addEventListener('pointermove', (e) => {
        e.preventDefault();
        const p = pointFromClient(e.clientX, e.clientY);
        moveDraw(p.x, p.y);
      });

      canvas.addEventListener('pointerup', (e) => { e.preventDefault(); endDraw(); });
      canvas.addEventListener('pointercancel', (e) => { e.preventDefault(); endDraw(); });
      canvas.addEventListener('pointerleave', (e) => { e.preventDefault(); endDraw(); });

      clearBtn.addEventListener('click', () => clearCanvas(true));
      window.addEventListener('resize', () => resizeCanvas(true));

      resizeCanvas(false);

      return { getValue, setValue, clear: () => clearCanvas(true), resize: () => resizeCanvas(true) };
    }

    function syncCompletedAtField() {
      const status = $('#asStatusInput').value;
      const completedAtInput = $('#completedAtInput');
      if (status === '泥섎━?꾨즺' && !completedAtInput.value) {
        completedAtInput.value = todayString();
      }
      if (status !== '泥섎━?꾨즺') {
        completedAtInput.value = '';
      }
    }

    function initSignaturePads() {
      if (!state.customerSignaturePad) {
        state.customerSignaturePad = createSignaturePad($('#customerSignatureCanvas'), $('#customerSignClearBtn'), {
          onChange: () => refreshPaperPreview()
        });
      }
      if (!state.installerSignaturePad) {
        state.installerSignaturePad = createSignaturePad($('#installerSignatureCanvas'), $('#installerSignClearBtn'), {
          onChange: () => refreshPaperPreview()
        });
      }
    }

    function fillRequestContext(request) {
      const contract = state.linkedContract;
      $('#requestMeta').textContent = `${displayText(request.asNo)} ?묒닔 / ${formatDateTime(request.createdAt)}`;
      setStatusBadge(request.status);

      setFieldText('fieldCustomerName', request.customerName || contract?.customerName);
      setFieldText('fieldPhone', request.phone || contract?.phone);
      setFieldText('fieldContractNo', contract?.contractNo || request.contractNo);
      setFieldText('fieldInstallerName', contract?.installerName || request.installerName || getCurrentInstallerName());
      setFieldText('fieldAddress', request.address || contract?.address);
      setFieldText('fieldProduct', resolveProductText(request, contract));
      setFieldText('fieldInstallDate', formatDateOnly(contract?.installDate));
      setFieldText('fieldRequestType', request.requestType || request.asType);
      setFieldText('fieldContactTime', request.contactTime);
      setFieldText('fieldRequestDetail', request.requestDetail);
      renderRequestImages(normalizeRequestImages(request));
      updateRequestDetailLink(request);
    }

    function fillEditor(request) {
      const contract = state.linkedContract;
      $('#asStatusInput').value = cleanText(request.status) || '?묒닔以?;
      $('#completedAtInput').value = cleanText(request.completedAt);
      $('#customerSignNameInput').value = cleanText(request.customerSignName) || cleanText(request.customerName) || cleanText(contract?.customerName);
      $('#installerSignNameInput').value = cleanText(request.installerSignName) || getCurrentInstallerName();
      $('#techNoteInput').value = cleanText(request.techNote);

      initSignaturePads();
      state.customerSignaturePad.setValue(cleanText(request.signatureImage));
      state.installerSignaturePad.setValue(cleanText(request.installerSignatureImage) || cleanText(state.installerProfile?.signatureImage));
      syncCompletedAtField();
      refreshPaperPreview();
    }

    function refreshPaperPreview() {
      const request = state.currentRequest;
      const contract = state.linkedContract;
      if (!request) return;

      const completedAt = cleanText($('#completedAtInput').value);
      const signDate = dateParts(completedAt || todayString());
      const customerSignName = cleanText($('#customerSignNameInput').value) || cleanText(request.customerName) || cleanText(contract?.customerName);
      const installerSignName = cleanText($('#installerSignNameInput').value) || getCurrentInstallerName();
      const customerSignImage = state.customerSignaturePad ? state.customerSignaturePad.getValue() : '';
      const installerSignImage = state.installerSignaturePad ? state.installerSignaturePad.getValue() : '';

      setStatusBadge($('#asStatusInput').value);
      setFieldText('fieldInstallerName', contract?.installerName || request.installerName || getCurrentInstallerName());

      document.getElementById('paperCustomerName').textContent = displayText(request.customerName || contract?.customerName);
      document.getElementById('paperAddress').textContent = displayText(request.address || contract?.address);
      document.getElementById('paperPhone').textContent = displayText(request.phone || contract?.phone);
      document.getElementById('paperProduct').textContent = displayText(resolveProductText(request, contract));
      document.getElementById('paperReason').textContent = displayText(request.requestDetail);
      document.getElementById('paperProcessNote').textContent = displayText($('#techNoteInput').value, '泥섎━?ы빆 誘멸린??);
      document.getElementById('paperYear').textContent = signDate.year;
      document.getElementById('paperMonth').textContent = signDate.month;
      document.getElementById('paperDay').textContent = signDate.day;
      document.getElementById('paperCustomerSignName').textContent = displayText(customerSignName);
      document.getElementById('paperInstallerSignName').textContent = displayText(installerSignName);
      updatePaperSignature('paperCustomerSignImage', customerSignImage);
      updatePaperSignature('paperInstallerSignImage', installerSignImage);
    }

    function upsertAsRequestState(request) {
      if (!request || !request.id) return;
      const idx = state.asRequests.findIndex((item) => String(item?.id || '') === String(request.id));
      if (idx === -1) state.asRequests.push(request);
      else state.asRequests[idx] = request;
    }

    function buildPayload() {
      const request = state.currentRequest || {};
      const contract = state.linkedContract || findContractForAsRequest(request);
      const status = cleanText($('#asStatusInput').value) || '?묒닔以?;
      const completedAt = status === '泥섎━?꾨즺'
        ? (cleanText($('#completedAtInput').value) || todayString())
        : '';

      return normalizeAsRequestItem({
        ...request,
        contractId: cleanText(request.contractId) || cleanText(contract?.id),
        contractNo: cleanText(request.contractNo) || cleanText(contract?.contractNo),
        customerName: cleanText(request.customerName) || cleanText(contract?.customerName),
        phone: cleanText(request.phone) || cleanText(contract?.phone),
        address: cleanText(request.address) || cleanText(contract?.address),
        product: cleanText(request.product) || resolveProductText(request, contract),
        installerName: cleanText(request.installerName) || cleanText(contract?.installerName) || getCurrentInstallerName(),
        installerPhone: cleanText(request.installerPhone) || cleanText(contract?.installerPhone) || getCurrentInstallerPhone(),
        requestType: cleanText(request.requestType || request.asType),
        requestDetail: cleanText(request.requestDetail),
        contactTime: cleanText(request.contactTime),
        status,
        techNote: cleanText($('#techNoteInput').value),
        completedAt,
        customerSignName: cleanText($('#customerSignNameInput').value) || cleanText(request.customerName) || cleanText(contract?.customerName),
        signatureImage: state.customerSignaturePad ? state.customerSignaturePad.getValue() : '',
        installerSignName: cleanText($('#installerSignNameInput').value) || getCurrentInstallerName(),
        installerSignatureImage: state.installerSignaturePad ? state.installerSignaturePad.getValue() : '',
        updatedAt: new Date().toISOString()
      });
    }

    function syncActionButtons() {
      $('#saveBtn').disabled = state.isSaving || !state.currentRequest;
      $('#printBtn').disabled = !state.currentRequest;
    }

    function renderRequest(request) {
      state.currentRequest = request;
      state.linkedContract = findContractForAsRequest(request);
      fillRequestContext(request);
      fillEditor(request);
      updateSourceChip();
      syncActionButtons();
    }

    async function refreshRequest(showMessage = false) {
      await loadData();
      updateSourceChip();

      const request = findAccessibleRequest();
      if (!request) {
        state.currentRequest = null;
        state.linkedContract = null;
        syncActionButtons();
        setTopNotice('?대떦 AS ?좎껌??李얠쓣 ???녾굅???꾩옱 愿由ъ옄?먭쾶 ?쒖떆?섏? ?딅뒗 ?댁뿭?낅땲??', 'error');
        return;
      }

      renderRequest(request);
      setTopNotice(showMessage ? 'AS 泥섎━ ?뺤씤???곗씠?곕? ?덈줈怨좎묠?덉뒿?덈떎.' : 'AS 泥섎━ ?뺤씤???곗씠?곕? 遺덈윭?붿뒿?덈떎.', 'success');
    }

    async function saveProcess() {
      if (!state.currentRequest || state.isSaving) return;

      const payload = buildPayload();
      state.isSaving = true;
      syncActionButtons();
      setTopNotice('AS 泥섎━ ?뺤씤?쒕? ??ν븯??以묒엯?덈떎.', '');

      try {
        const data = await postRemote('saveAsRequest', { asRequest: payload });
        const saved = normalizeAsRequestItem(data.asRequest || payload);
        upsertAsRequestState(saved);
        state.currentRequest = saved;
        saveLocal();
        state.source = 'sheets';
        renderRequest(saved);
        setTopNotice('AS 泥섎━ ?뺤씤?쒕? ??ν뻽?듬땲??', 'success');
      } catch (err) {
        upsertAsRequestState(payload);
        state.currentRequest = payload;
        saveLocal();
        state.source = 'local';
        renderRequest(payload);
        setTopNotice(`援ш??쒗듃 ????ㅽ뙣濡?濡쒖뺄????ν뻽?듬땲?? ${err.message}`, 'error');
      } finally {
        state.isSaving = false;
        syncActionButtons();
      }
    }

    function enableDevAutoReload() {
      if (location.protocol !== 'http:' && location.protocol !== 'https:') return;
      if (!(location.hostname === 'localhost' || location.hostname === '127.0.0.1')) return;

      let lastModified = null;
      setInterval(async () => {
        try {
          const res = await fetch(location.href.split('#')[0], { method: 'HEAD', cache: 'no-store' });
          const next = res.headers.get('Last-Modified');
          if (!next) return;
          if (lastModified && next !== lastModified) {
            location.reload();
            return;
          }
          lastModified = next;
        } catch (_) {}
      }, 1200);
    }

    $('#asStatusInput').addEventListener('change', () => {
      syncCompletedAtField();
      refreshPaperPreview();
    });
    $('#completedAtInput').addEventListener('input', refreshPaperPreview);
    $('#customerSignNameInput').addEventListener('input', refreshPaperPreview);
    $('#installerSignNameInput').addEventListener('input', refreshPaperPreview);
    $('#techNoteInput').addEventListener('input', refreshPaperPreview);
    $('#saveBtn').addEventListener('click', saveProcess);
    $('#printBtn').addEventListener('click', () => {
      refreshPaperPreview();
      window.print();
    });
    $('#refreshBtn').addEventListener('click', async () => {
      await refreshRequest(true);
    });

    (async function init() {
      const entry = guardAdminAccess();
      if (!entry) return;

      state.currentAdmin = {
        name: String(entry.name || '').trim(),
        phone: toDigits(entry.phone || '')
      };
      state.installerProfile = loadInstallerProfile({
        name: entry.name,
        phone: entry.phone
      });

      if (!String(localStorage.getItem(SHEETS_API_URL_KEY) || '').trim()) {
        localStorage.setItem(SHEETS_API_URL_KEY, DEFAULT_SHEETS_API_URL);
      }

      initSignaturePads();
      await refreshRequest(false);
      enableDevAutoReload();
    })();
  </script>
