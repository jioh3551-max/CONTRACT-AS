<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이콩콩 로그인</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --mint: #48b7b6;
      --mint-deep: #2f9191;
      --pink: #ef9db8;
      --ink: #202a36;
      --soft-text: #6c7687;
      --page: #e3e8ed;
      --panel: #f3f5f8;
      --field: #d9dfe8;
      --button: #9fadc0;
      --button-text: #ffffff;
      --link: #5da5c2;
      --ring: 0 0 0 3px rgba(72, 183, 182, 0.2);
    }

    body {
      margin: 0;
      font-family: "Pretendard", "SUIT", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #e2e4e7;
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
      background:
        radial-gradient(700px 320px at 20% -10%, rgba(72, 183, 182, 0.16) 0%, rgba(72, 183, 182, 0) 58%),
        radial-gradient(700px 340px at 110% 10%, rgba(239, 157, 184, 0.16) 0%, rgba(239, 157, 184, 0) 55%),
        #e2e4e7;
    }

    .phone {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      background: var(--page);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.5);
      display: flex;
      flex-direction: column;
    }

    .top {
      padding: 0;
      background: linear-gradient(180deg, #eff2f5 0%, #eef1f4 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      max-width: none;
      height: auto;
      max-height: clamp(180px, 28dvh, 260px);
      display: block;
    }

    .panel {
      margin-top: -4px;
      background: var(--panel);
      border-top-left-radius: 34px;
      border-top-right-radius: 34px;
      padding: 20px 18px 18px;
      box-shadow: 0 -6px 16px rgba(50, 74, 90, 0.08);
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
    }

    .welcome {
      margin: 2px 0 4px;
      font-size: clamp(34px, 7vw, 42px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      color: #2a3443;
    }

    .welcome-sub {
      margin: 0 0 14px;
      color: var(--soft-text);
      font-size: 13px;
      font-weight: 600;
    }

    .field { margin-bottom: 12px; }

    .remember-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 2px 0 10px;
      flex-wrap: wrap;
    }

    .remember-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: #5f6777;
      cursor: pointer;
    }

    .remember-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--mint-deep);
      cursor: pointer;
      padding: 0;
      box-shadow: none;
    }

    .remember-clear {
      border: 0;
      background: transparent;
      color: #6b8fa5;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
    }

    .remember-clear[hidden] {
      display: none;
    }

    .remembered-box {
      margin: 0 0 10px;
      border: 1px solid rgba(72, 183, 182, 0.16);
      border-radius: 14px;
      background: rgba(232, 245, 244, 0.8);
      color: #236f6f;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
      font-weight: 700;
    }

    .remembered-box[hidden] {
      display: none;
    }

    label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #5f6777;
    }

    .input-wrap { position: relative; }

    input {
      width: 100%;
      border: 1px solid rgba(163, 176, 193, 0.35);
      border-radius: 16px;
      background: var(--field);
      color: #1f2937;
      font-size: 17px;
      padding: 14px 50px 14px 16px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    input:focus {
      border-color: rgba(72, 183, 182, 0.7);
      box-shadow: var(--ring);
      background: #e4ebf3;
    }

    input::placeholder {
      color: #9aa7b5;
      font-weight: 600;
    }

    .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid #6c8098;
      background: transparent;
      color: #6c8098;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .btn {
      width: 100%;
      margin-top: 8px;
      border: 0;
      border-radius: 16px;
      padding: 15px 14px;
      background: linear-gradient(180deg, #aab7c8 0%, #97a8be 100%);
      color: var(--button-text);
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(66, 95, 110, 0.2);
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    .btn:hover { filter: brightness(1.02); }
    .btn:active { transform: translateY(1px); }

    .notice {
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid #d8dee6;
      background: #f3f6fa;
      color: #5f6b7a;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }

    .notice.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #b91c1c;
    }

    .bottom {
      margin-top: auto;
      text-align: center;
      padding: 18px 0 6px;
      border-top: 1px solid rgba(150, 166, 184, 0.18);
    }

    .support {
      color: #5e9cb4;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .faq-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--link);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .faq-link .arrow {
      font-size: 34px;
      line-height: 1;
      margin-top: -2px;
    }

    @media (min-width: 431px) {
      body { padding: 18px; }
      .phone {
        min-height: 0;
        border-radius: 30px;
        box-shadow: 0 26px 54px rgba(43, 67, 78, 0.24);
      }
    }

  </style>
</head>
<body>
  <main class="phone">
    <section class="top">
      <img class="hero-image" src="./아이콩콩이미지.png" alt="아이콩콩 브랜드 이미지" />
    </section>

    <section class="panel">
      <h1 class="welcome">Welcome</h1>
      <p class="welcome-sub">이름과 연락처를 입력하면 고객/관리자 화면으로 자동 이동됩니다.</p>

      <form id="entryLoginForm">
        <div class="field">
          <label>이름</label>
          <div class="input-wrap">
            <input id="nameInput" name="name" placeholder="이름을 입력하세요." required />
            <button class="clear-btn" id="clearNameBtn" type="button" aria-label="이름 지우기">×</button>
          </div>
        </div>

        <div class="field">
          <label>연락처</label>
          <div class="input-wrap">
            <input id="phoneInput" name="phone" placeholder="연락처를 입력하세요." required />
          </div>
        </div>

        <div class="remember-row">
          <label class="remember-label" for="rememberAdminCheck">
            <input id="rememberAdminCheck" type="checkbox" />
            <span>시공자 자동 로그인</span>
          </label>
          <button id="clearSavedLoginBtn" class="remember-clear" type="button" hidden>저장된 로그인 해제</button>
        </div>
        <div id="rememberedLoginHint" class="remembered-box" hidden></div>

        <button class="btn" type="submit">로그인</button>
      </form>

      <div id="entryMsg" class="notice"></div>

      <div class="bottom">
        <div class="support">지원문의 : ikongkongmat@naver.com</div>
        <a class="faq-link" href="./faq.html">FAQ 바로가기 <span class="arrow">›</span></a>
      </div>
    </section>
  </main>

  <script>
    const ENTRY_SESSION_KEY = 'aikongkong_entry_session_v1';
    const AUTO_ADMIN_LOGIN_KEY = 'aikongkong_auto_admin_login_v1';
    const SHEETS_API_URL_KEY = 'aikongkong_sheets_api_url';
    const ADMIN_CACHE_KEY = 'aikongkong_admin_users_v1';
    const ADMIN_CACHE_UPDATED_AT_KEY = 'aikongkong_admin_users_updated_at_v1';
    const DEFAULT_SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbwXzHRK86DjFBUtxvg5nhKaIl7Zaqq7Qm2P6Et7Db3fBEq2j5abLaBVxGSBmqX2WZ6V/exec';
    const LEGACY_SHEETS_API_URLS = [
      'https://script.google.com/macros/s/AKfycbyKNzu0YgVz5nuwldhlH5XyJefzvBMPT68B3LfrcRzvdiDw5TzKqe7KsRASdk3AcaP6/exec'
    ];
    const ADMIN_CACHE_MAX_AGE_MS = 60 * 1000;
    const ADMIN_FETCH_TIMEOUT_MS = 5000;
    const CUSTOMER_FETCH_TIMEOUT_MS = 15000;
    const CUSTOMER_LOOKUP_ACTION = 'findCustomerLogin';
    const BUILTIN_ADMINS = [
      { id: 'admin_default_jeongjio', name: '정지오', phone: '01085259253', isActive: 'Y' }
    ];

    const $ = (s) => document.querySelector(s);
    const toDigits = (v) => String(v || '').replace(/[^0-9]/g, '');
    let adminSyncPromise = null;

    function normalizeCustomerName(name) {
      return String(name || '').replace(/\s+/g, '').trim();
    }

    function normalizeAdminPhone(phone) {
      const digits = toDigits(phone);
      if (!digits) return '';
      if (digits.length === 10 && !digits.startsWith('0')) {
        return `0${digits}`;
      }
      return digits;
    }

    function getAdminPhoneCandidates(phone) {
      const normalized = normalizeAdminPhone(phone);
      const candidates = new Set();
      if (normalized) candidates.add(normalized);

      const digits = toDigits(phone);
      if (digits) candidates.add(digits);

      Array.from(candidates).forEach((value) => {
        if (value.startsWith('0') && value.length > 1) {
          candidates.add(value.slice(1));
        } else if (!value.startsWith('0') && value.length === 10) {
          candidates.add(`0${value}`);
        }
      });

      return Array.from(candidates).filter(Boolean);
    }

    function isSameAdminPhone(left, right) {
      const leftCandidates = new Set(getAdminPhoneCandidates(left));
      return getAdminPhoneCandidates(right).some((value) => leftCandidates.has(value));
    }

    function getSheetsApiUrl() {
      const fromLocal = String(localStorage.getItem(SHEETS_API_URL_KEY) || '').trim();
      if (fromLocal && !LEGACY_SHEETS_API_URLS.includes(fromLocal)) return fromLocal;
      localStorage.setItem(SHEETS_API_URL_KEY, DEFAULT_SHEETS_API_URL);
      return DEFAULT_SHEETS_API_URL;
    }

    function isManualEntryMode() {
      return new URLSearchParams(location.search).get('manual') === '1';
    }

    function readAutoAdminLogin() {
      try {
        const raw = localStorage.getItem(AUTO_ADMIN_LOGIN_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        if (!parsed || parsed.role !== 'admin') return null;
        const phone = normalizeAdminPhone(parsed.phone);
        if (!phone) return null;
        return {
          role: 'admin',
          adminId: String(parsed.adminId || ''),
          name: String(parsed.name || '').trim(),
          phone,
          savedAt: String(parsed.savedAt || '')
        };
      } catch (_) {
        return null;
      }
    }

    function saveAutoAdminLogin(admin, fallbackName, phone) {
      const normalizedPhone = normalizeAdminPhone(phone);
      if (!normalizedPhone) return;
      localStorage.setItem(AUTO_ADMIN_LOGIN_KEY, JSON.stringify({
        role: 'admin',
        adminId: String(admin?.id || ''),
        name: String(admin?.name || fallbackName || '').trim(),
        phone: normalizedPhone,
        savedAt: new Date().toISOString()
      }));
      syncRememberedLoginUi();
    }

    function clearAutoAdminLogin() {
      localStorage.removeItem(AUTO_ADMIN_LOGIN_KEY);
      syncRememberedLoginUi();
    }

    function syncRememberedLoginUi() {
      const remembered = readAutoAdminLogin();
      const clearBtn = $('#clearSavedLoginBtn');
      const hint = $('#rememberedLoginHint');
      clearBtn.hidden = !remembered;
      if (remembered) {
        $('#rememberAdminCheck').checked = true;
        if (!$('#nameInput').value.trim()) $('#nameInput').value = remembered.name;
        if (!$('#phoneInput').value.trim()) $('#phoneInput').value = remembered.phone;
        hint.hidden = false;
        hint.textContent = `저장된 시공자 로그인: ${remembered.name || '-'} / ${remembered.phone || '-'} · 이 기기에서는 첫 화면 진입 시 자동으로 관리자 페이지로 이동합니다.`;
      } else {
        hint.hidden = true;
        hint.textContent = '';
      }
    }

    function startAdminSession(admin, name, phone) {
      sessionStorage.setItem(ENTRY_SESSION_KEY, JSON.stringify({
        role: 'admin',
        adminId: String(admin?.id || ''),
        name: admin?.name || name,
        phone: normalizeAdminPhone(phone),
        loggedAt: new Date().toISOString()
      }));
    }

    function mergeAdminsWithBuiltin(admins) {
      const map = new Map();
      BUILTIN_ADMINS.forEach((admin) => {
        const phoneKey = normalizeAdminPhone(admin.phone);
        if (!phoneKey) return;
        map.set(phoneKey, {
          ...admin,
          phone: phoneKey
        });
      });
      (Array.isArray(admins) ? admins : []).forEach((admin) => {
        const phoneKey = normalizeAdminPhone(admin?.phone);
        if (!phoneKey) return;
        map.set(phoneKey, {
          ...map.get(phoneKey),
          ...admin,
          phone: phoneKey
        });
      });
      return Array.from(map.values());
    }

    function getCachedAdmins() {
      try {
        const raw = localStorage.getItem(ADMIN_CACHE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return mergeAdminsWithBuiltin(parsed);
      } catch (_) {
        return [...BUILTIN_ADMINS];
      }
    }

    function setCachedAdmins(admins) {
      localStorage.setItem(ADMIN_CACHE_KEY, JSON.stringify(mergeAdminsWithBuiltin(admins)));
      localStorage.setItem(ADMIN_CACHE_UPDATED_AT_KEY, new Date().toISOString());
    }

    function isAdminCacheFresh() {
      const raw = String(localStorage.getItem(ADMIN_CACHE_UPDATED_AT_KEY) || '').trim();
      if (!raw) return false;
      const savedAt = new Date(raw);
      if (Number.isNaN(savedAt.getTime())) return false;
      return (Date.now() - savedAt.getTime()) <= ADMIN_CACHE_MAX_AGE_MS;
    }

    function isAdminActive(admin) {
      const flag = String(admin?.isActive == null ? 'Y' : admin.isActive).trim().toUpperCase();
      return !(flag === 'N' || flag === 'FALSE' || flag === '0');
    }

    function findAdminByPhone(phone, admins) {
      return (admins || []).find((admin) => {
        return isSameAdminPhone(admin.phone, phone) && isAdminActive(admin);
      }) || null;
    }

    function findCustomerContractByEntry(contracts, name, phone) {
      const targetName = normalizeCustomerName(name);
      const targetPhone = toDigits(phone);
      if (!targetName || !targetPhone) return null;
      return (contracts || []).find((contract) => {
        return toDigits(contract?.phone) === targetPhone
          && normalizeCustomerName(contract?.customerName) === targetName;
      }) || null;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = ADMIN_FETCH_TIMEOUT_MS) {
      const controller = typeof AbortController === 'function' ? new AbortController() : null;
      let timeoutId = 0;
      const timeoutMessage = `관리자 목록 동기화 대기시간 초과 (${Math.ceil(timeoutMs / 1000)}초)`;
      const timeoutPromise = new Promise((_, reject) => {
        timeoutId = window.setTimeout(() => {
          if (controller) controller.abort();
          reject(new Error(timeoutMessage));
        }, timeoutMs);
      });

      try {
        return await Promise.race([
          fetch(url, {
            ...options,
            ...(controller ? { signal: controller.signal } : {})
          }).catch((err) => {
            if (controller && err?.name === 'AbortError') {
              throw new Error(timeoutMessage);
            }
            throw err;
          }),
          timeoutPromise
        ]);
      } finally {
        if (timeoutId) window.clearTimeout(timeoutId);
      }
    }

    async function fetchAdminsFromSheets() {
      const apiUrl = getSheetsApiUrl();
      if (!apiUrl) return getCachedAdmins();
      const sep = apiUrl.includes('?') ? '&' : '?';
      const res = await fetchWithTimeout(`${apiUrl}${sep}action=loadAdmins&t=${Date.now()}`, { method: 'GET', cache: 'no-store' });
      if (!res.ok) throw new Error(`연동 서버 응답 오류 (${res.status})`);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || '관리자 목록 로드 실패');
      const admins = mergeAdminsWithBuiltin(Array.isArray(data.admins) ? data.admins : []);
      setCachedAdmins(admins);
      return admins;
    }

    async function fetchCustomerLoginMatch(name, phone) {
      const apiUrl = getSheetsApiUrl();
      if (!apiUrl) {
        throw new Error('구글시트 API URL이 설정되지 않았습니다.');
      }

      const sep = apiUrl.includes('?') ? '&' : '?';
      const query = `${apiUrl}${sep}action=${encodeURIComponent(CUSTOMER_LOOKUP_ACTION)}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&t=${Date.now()}`;
      let res = await fetchWithTimeout(query, { method: 'GET', cache: 'no-store' }, CUSTOMER_FETCH_TIMEOUT_MS);
      if (!res.ok) throw new Error(`연동 서버 응답 오류 (${res.status})`);

      let data = await res.json();
      if (data?.ok && typeof data.matched === 'boolean') {
        return data.customer || null;
      }

      if (!data?.ok && !String(data?.error || '').startsWith('UNKNOWN_ACTION')) {
        throw new Error(data.error || '고객 계약 확인 실패');
      }

      const fallbackRes = await fetchWithTimeout(`${apiUrl}${sep}action=load&t=${Date.now()}`, { method: 'GET', cache: 'no-store' }, CUSTOMER_FETCH_TIMEOUT_MS);
      if (!fallbackRes.ok) throw new Error(`연동 서버 응답 오류 (${fallbackRes.status})`);
      data = await fallbackRes.json();
      if (!data?.ok) throw new Error(data?.error || '고객 계약 확인 실패');

      return findCustomerContractByEntry(Array.isArray(data.contracts) ? data.contracts : [], name, phone);
    }

    function refreshAdminsFromSheets(force = false) {
      if (!force && adminSyncPromise) return adminSyncPromise;
      adminSyncPromise = fetchAdminsFromSheets()
        .finally(() => {
          adminSyncPromise = null;
        });
      return adminSyncPromise;
    }

    function showMsg(text, type = '') {
      const el = $('#entryMsg');
      el.style.display = 'block';
      el.className = `notice ${type}`.trim();
      el.textContent = text;
    }

    function clearMsg() {
      const el = $('#entryMsg');
      el.style.display = 'none';
      el.className = 'notice';
      el.textContent = '';
    }

    $('#clearNameBtn').addEventListener('click', () => {
      $('#nameInput').value = '';
      $('#nameInput').focus();
    });

    $('#clearSavedLoginBtn').addEventListener('click', () => {
      clearAutoAdminLogin();
      $('#rememberAdminCheck').checked = false;
      showMsg('저장된 시공자 자동 로그인을 해제했습니다.');
    });

    $('#entryLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.currentTarget;
      const name = form.name.value.trim();
      const phone = toDigits(form.phone.value);
      clearMsg();

      if (!name || phone.length < 10) {
        showMsg('이름과 연락처를 정확히 입력해주세요.', 'error');
        return;
      }

      let admins = getCachedAdmins();
      let matchedAdmin = findAdminByPhone(phone, admins);
      try {
        const shouldSyncBeforeLogin = !matchedAdmin || !isAdminCacheFresh();
        if (shouldSyncBeforeLogin) {
          admins = await refreshAdminsFromSheets(true);
          matchedAdmin = findAdminByPhone(phone, admins);
        } else {
          refreshAdminsFromSheets(false).catch(() => {});
        }
      } catch (err) {
        showMsg(`관리자 목록 동기화 실패(캐시 사용): ${err.message}`, 'error');
      }

      matchedAdmin = matchedAdmin || findAdminByPhone(phone, admins);
      if (matchedAdmin) {
        startAdminSession(matchedAdmin, name, phone);
        if ($('#rememberAdminCheck').checked) {
          saveAutoAdminLogin(matchedAdmin, name, phone);
        } else {
          clearAutoAdminLogin();
        }
        location.href = './admin.html';
        return;
      }

      let matchedCustomer = null;
      try {
        matchedCustomer = await fetchCustomerLoginMatch(name, phone);
      } catch (err) {
        showMsg(`고객 계약 확인 실패: ${err.message}`, 'error');
        return;
      }

      if (!matchedCustomer) {
        sessionStorage.removeItem(ENTRY_SESSION_KEY);
        showMsg('등록된 고객 계약이 없습니다. 관리자에게 계약 등록 여부를 확인해주세요.', 'error');
        return;
      }

      sessionStorage.setItem(ENTRY_SESSION_KEY, JSON.stringify({
        role: 'customer',
        customerId: String(matchedCustomer.id || ''),
        contractNo: String(matchedCustomer.contractNo || ''),
        name: matchedCustomer.customerName || name,
        phone: toDigits(matchedCustomer.phone || phone),
        loggedAt: new Date().toISOString(),
        verifiedAt: new Date().toISOString()
      }));
      location.href = './customer.html';
    });

    function enableDevAutoReload() {
      if (location.protocol !== 'http:' && location.protocol !== 'https:') return;
      if (!(location.hostname === 'localhost' || location.hostname === '127.0.0.1')) return;

      let lastModified = null;
      setInterval(async () => {
        try {
          const res = await fetch(location.href.split('#')[0], { method: 'HEAD', cache: 'no-store' });
          const next = res.headers.get('Last-Modified');
          if (!next) return;
          if (lastModified && next !== lastModified) {
            location.reload();
            return;
          }
          lastModified = next;
        } catch (_) {}
      }, 1200);
    }

    if (!String(localStorage.getItem(SHEETS_API_URL_KEY) || '').trim()) {
      localStorage.setItem(SHEETS_API_URL_KEY, DEFAULT_SHEETS_API_URL);
    }
    if (!localStorage.getItem(ADMIN_CACHE_KEY)) {
      setCachedAdmins(BUILTIN_ADMINS);
    }
    syncRememberedLoginUi();
    refreshAdminsFromSheets(false).catch(() => {});

    (async function maybeAutoLoginAdmin() {
      if (isManualEntryMode()) return;

      const remembered = readAutoAdminLogin();
      if (!remembered) return;

      showMsg('저장된 시공자 로그인 정보를 확인 중입니다.');

      let admins = getCachedAdmins();
      let matchedAdmin = findAdminByPhone(remembered.phone, admins);
      try {
        if (!matchedAdmin || !isAdminCacheFresh()) {
          admins = await refreshAdminsFromSheets(true);
          matchedAdmin = findAdminByPhone(remembered.phone, admins);
        }
      } catch (_) {}

      matchedAdmin = matchedAdmin || findAdminByPhone(remembered.phone, admins);
      if (!matchedAdmin) {
        clearAutoAdminLogin();
        clearMsg();
        return;
      }

      startAdminSession(matchedAdmin, remembered.name, remembered.phone);
      location.href = './admin.html';
    })();

    enableDevAutoReload();
  </script>
</body>
</html>
